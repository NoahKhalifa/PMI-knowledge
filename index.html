<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Management Dashboard — PMP | PgMP | PfMP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="header">
    <div class="header-title">
        <div class="logo-icon">PM</div>
        <h1>Management Dashboard<span>PMP &bull; PgMP &bull; PfMP Guideline</span></h1>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="showTab(0)">Project Management <span class="badge">PMP</span></div>
        <div class="tab" onclick="showTab(1)">Program Management <span class="badge">PgMP</span></div>
        <div class="tab" onclick="showTab(2)">Portfolio Management <span class="badge">PfMP</span></div>
    </div>
</div>

<div class="content">
    <div class="tab-content" id="tab0">
        <!-- Sub-tabs for Project Management -->
        <div class="sub-tabs">
            <div class="sub-tab active" onclick="showSubTab(0, 0)">🚀 Implementation</div>
            <div class="sub-tab" onclick="showSubTab(0, 1)">📋 Project Knowledge Areas</div>
            <div class="sub-tab" onclick="showSubTab(0, 2)">🔄 49 Processes PMP Flow</div>
        </div>
        <div class="sub-tab-content" id="tab0-sub0"><div class="tab-loading">Loading...</div></div>
        <div class="sub-tab-content" id="tab0-sub1" style="display:none"><div class="tab-loading">Loading...</div></div>
        <div class="sub-tab-content" id="tab0-sub2" style="display:none"><div class="tab-loading">Loading...</div></div>
    </div>
    <div class="tab-content" id="tab1" style="display:none"><div class="tab-loading">Loading...</div></div>
    <div class="tab-content" id="tab2" style="display:none"><div class="tab-loading">Loading...</div></div>
</div>

<!-- POPUP -->
<div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle"></h3>
        </div>
        <div class="modal-body">
            <p id="modalContent"></p>
        </div>
    </div>
</div>

<!-- JS: Glossary & Components -->
<script src="js/glossary.js"></script>
<script src="js/components.js"></script>

<!-- Content registry (must be before data files) -->
<script>const tabContent = {};</script>

<!-- Data files -->
<script src="data/process-data.js"></script>

<!-- KA Components (populate processData & kaRows) -->
<script src="data/component/ka-integration.js"></script>
<script src="data/component/ka-scope.js"></script>
<script src="data/component/ka-schedule.js"></script>
<script src="data/component/ka-cost.js"></script>
<script src="data/component/ka-quality.js"></script>
<script src="data/component/ka-resource.js"></script>
<script src="data/component/ka-communications.js"></script>
<script src="data/component/ka-risk.js"></script>
<script src="data/component/ka-procurement.js"></script>
<script src="data/component/ka-stakeholder.js"></script>

<!-- Implementation sub-components (load in order) -->
<script src="data/component/impl/impl-config.js"></script>
<script src="data/component/impl/impl-activities.js"></script>
<script src="data/component/impl/impl-render.js"></script>
<script src="data/component/impl/impl-interaction.js"></script>
<script src="data/component/implementation.js"></script>
<script src="data/component/pmp-flow.js"></script>

<!-- Tab content (uses kaRows from components) -->
<script src="data/project-management.js"></script>
<script src="data/program-management.js"></script>
<script src="data/portfolio-management.js"></script>

<!-- App logic -->
<script src="js/app.js"></script>
<script>renderTabs(); initActivityDiagram();</script>

</body>
</html>
